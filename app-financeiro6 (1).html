<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Financeiro</title>
<style>
:root{
  --bg:#060608;
  --glow: radial-gradient(130% 85% at 50% -12%, rgba(174,243,78,0.15), transparent 52%),
          radial-gradient(80% 55% at 92% 8%, rgba(124,77,255,0.09), transparent 48%);
  --glass-bg:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.10);
  --glass-highlight:rgba(255,255,255,0.5);--glass-gloss:rgba(255,255,255,0.09);--glass-blur:20px;
  --text:#f5f5f7;--text-dim:#a6a7af;--text-faint:#6a6b74;
  --lime:#b4f44a;--lime-deep:#83d626;--orange:#ff8a3d;--pink:#ff4d8d;--magenta:#c44bff;--red:#ff6060;--blue:#4da3ff;
  --nav-bg:rgba(20,20,23,0.64);--nav-pill:rgba(255,255,255,0.13);--icon-bg:var(--glass-bg);
  --track-bg:rgba(255,255,255,0.09);--card-shadow:none;--chart-bar:rgba(255,255,255,0.10);
  --radius:22px;--radius-sm:16px;--radius-xs:11px;
  --font-display:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--font:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--nav-h:58px;
}
[data-theme="light"]{
  --bg:#eef0ea;
  --glow: radial-gradient(130% 80% at 50% -15%, rgba(131,214,38,0.10), transparent 48%),
          radial-gradient(80% 55% at 95% 5%, rgba(124,77,255,0.05), transparent 45%);
  --glass-bg:rgba(255,255,255,0.62);--glass-border:rgba(255,255,255,0.85);
  --glass-highlight:rgba(255,255,255,0.95);--glass-gloss:rgba(255,255,255,0.45);--glass-blur:22px;
  --text:#1c1d22;--text-dim:#5c5d66;--text-faint:#8d8e98;
  --lime:#7ec61c;--lime-deep:#5fa015;--orange:#f0791f;--pink:#ec3b7c;--magenta:#a93be0;--red:#e23b3b;--blue:#2b7fd4;
  --nav-bg:rgba(255,255,255,0.72);--nav-pill:rgba(0,0,0,0.07);--icon-bg:rgba(255,255,255,0.7);
  --track-bg:rgba(0,0,0,0.08);--card-shadow:0 4px 20px rgba(60,70,40,0.08);--chart-bar:rgba(0,0,0,0.07);
}
html{transition:background .4s ease;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--glow),var(--bg);background-attachment:fixed;color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em;
  padding-bottom:calc(var(--nav-h) + 42px + env(safe-area-inset-bottom,0px));transition:background .4s,color .4s;}
.app{max-width:540px;margin:0 auto;padding:0 16px;}
.glass{position:relative;background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(175%);
  -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(175%);border:1px solid var(--glass-border);
  border-radius:var(--radius);overflow:hidden;isolation:isolate;box-shadow:var(--card-shadow);}
.glass::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;pointer-events:none;z-index:2;
  background:linear-gradient(135deg,var(--glass-highlight),transparent 38%,transparent 66%,rgba(255,255,255,0.10));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.65;}
.glass::after{content:"";position:absolute;left:0;right:0;top:0;height:40%;border-radius:inherit;pointer-events:none;z-index:1;
  background:linear-gradient(180deg,var(--glass-gloss),transparent);opacity:.55;}
.glass>*{position:relative;z-index:3;}
.top{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 14px;margin:0 -16px;
  position:sticky;top:0;z-index:90;}
.top>*{position:relative;z-index:1;}
/* Fade em degradê: várias camadas de blur cada vez mais intenso perto do topo,
   mascaradas para diluir gradualmente até ficar 100% transparente no final do efeito. */
.top-fade{position:absolute;left:0;right:0;top:0;height:calc(100% + 46px);z-index:0;
  opacity:0;transition:opacity .4s ease;pointer-events:none;}
.top.scrolled .top-fade{opacity:1;}
.top-fade i{position:absolute;inset:0;display:block;}
.top-fade i:nth-child(1){backdrop-filter:blur(2px) saturate(150%);-webkit-backdrop-filter:blur(2px) saturate(150%);
  -webkit-mask-image:linear-gradient(to bottom,#000 0%,#000 40%,transparent 70%);mask-image:linear-gradient(to bottom,#000 0%,#000 40%,transparent 70%);}
.top-fade i:nth-child(2){backdrop-filter:blur(6px) saturate(165%);-webkit-backdrop-filter:blur(6px) saturate(165%);
  -webkit-mask-image:linear-gradient(to bottom,#000 0%,#000 28%,transparent 55%);mask-image:linear-gradient(to bottom,#000 0%,#000 28%,transparent 55%);}
.top-fade i:nth-child(3){backdrop-filter:blur(14px) saturate(180%);-webkit-backdrop-filter:blur(14px) saturate(180%);
  -webkit-mask-image:linear-gradient(to bottom,#000 0%,#000 16%,transparent 38%);mask-image:linear-gradient(to bottom,#000 0%,#000 16%,transparent 38%);}
.top-fade i:nth-child(4){background:var(--nav-bg);
  -webkit-mask-image:linear-gradient(to bottom,#000 0%,#000 8%,transparent 22%);mask-image:linear-gradient(to bottom,#000 0%,#000 8%,transparent 22%);}
.top h1{font-size:22px;font-weight:400;font-family:var(--font-display);letter-spacing:-0.01em;transition:font-size .3s ease;}
.top.scrolled h1{font-size:18px;}
.top .sub{font-size:13px;color:var(--text-faint);margin-top:1px;font-weight:500;}
.top-actions{display:flex;gap:9px;}
.icon-btn{width:40px;height:40px;border-radius:50%;background:var(--icon-bg);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);display:flex;align-items:center;
  justify-content:center;color:var(--text-dim);cursor:pointer;position:relative;overflow:hidden;}
.icon-btn:active{transform:scale(0.92);}
.icon-btn.pill{border-radius:999px;}
#themeToggle.pill,#colorToggle.pill{width:48px;}
#banksToggle.pill{width:64px;padding:0 7px;}
.icon-btn.spin svg{animation:spin .8s linear;}
@keyframes spin{to{transform:rotate(360deg);}}
.theme-toggle svg{position:absolute;transition:opacity .35s,transform .45s cubic-bezier(0.34,1.4,0.5,1);}
.theme-toggle .ic-sun{opacity:0;transform:rotate(-90deg) scale(0.5);}
[data-theme="light"] .theme-toggle .ic-sun{opacity:1;transform:none;color:var(--orange);}
[data-theme="light"] .theme-toggle .ic-moon{opacity:0;transform:rotate(90deg) scale(0.5);}
.icon-btn-wrap{position:relative;}
.color-dot{width:17px;height:17px;border-radius:50%;display:block;background:conic-gradient(from 0deg,#ff6060,#ff8a3d,#b4f44a,#4da3ff,#c44bff,#ff4d8d,#ff6060);}
.color-pop{position:absolute;top:48px;right:0;width:208px;padding:14px;border-radius:18px;background:var(--glass-bg);
  backdrop-filter:blur(var(--glass-blur)) saturate(175%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(175%);
  border:1px solid var(--glass-border);box-shadow:0 14px 34px rgba(0,0,0,0.35);z-index:50;
  opacity:0;transform:translateY(-6px) scale(0.96);pointer-events:none;transition:opacity .2s,transform .2s;}
.color-pop.show{opacity:1;transform:none;pointer-events:auto;}
.color-pop-title{font-size:13px;font-weight:500;color:var(--text-dim);margin-bottom:10px;}
.swatches{display:flex;flex-wrap:wrap;gap:10px;}
.swatch{width:30px;height:30px;border-radius:50%;border:2px solid var(--glass-border);cursor:pointer;padding:0;flex:0 0 auto;}
.swatch:active{transform:scale(0.9);}
.custom-swatch{display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:conic-gradient(from 0deg,#ff6060,#ff8a3d,#b4f44a,#4da3ff,#c44bff,#ff4d8d,#ff6060);}
.custom-swatch input[type="color"]{opacity:0;width:100%;height:100%;cursor:pointer;border:none;padding:0;}
.banks-stack{display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.banks-stack .bs-logo{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);margin-left:-8px;color:#fff;}
.banks-stack .bs-logo:first-child{margin-left:0;}
.banks-stack .bs-logo svg{width:60%;height:60%;}
.banks-stack .bs-logo .txt{font-size:8.5px;font-weight:700;font-family:var(--font-display);}
.banks-pop{width:240px;}
.bank-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
.bank-row:not(:last-child){border-bottom:1px solid var(--glass-border);}
.bank-row .bic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto;}
.bank-row .bic svg{width:56%;height:56%;}
.bank-row .bic .txt{font-size:11px;font-weight:700;font-family:var(--font-display);}
.bank-row .bmain{flex:1;min-width:0;}
.bank-row .bname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bank-row .bupd{font-size:11.5px;color:var(--text-faint);margin-top:1px;display:flex;align-items:center;gap:5px;}
.bank-row .bupd .bdot{width:6px;height:6px;border-radius:50%;background:var(--lime);flex:0 0 auto;}
.banks-add{margin-top:10px;padding:10px;border-radius:12px;background:var(--track-bg);text-align:center;font-size:13px;font-weight:500;color:var(--text-dim);cursor:pointer;}
.banks-add:active{transform:scale(0.97);}
.refresh-pop{width:248px;}
.refresh-opt{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:13px;cursor:pointer;transition:background .15s;}
.refresh-opt:active{transform:scale(0.97);}
.refresh-opt:not(:last-of-type){margin-bottom:3px;}
.refresh-opt .ro-ic{width:30px;height:30px;border-radius:50%;background:var(--track-bg);display:flex;align-items:center;
  justify-content:center;color:var(--text-dim);flex:0 0 auto;}
.refresh-opt .ro-ic svg{width:15px;height:15px;}
.refresh-opt .ro-txt{flex:1;min-width:0;}
.refresh-opt .ro-t{font-size:13.5px;font-weight:600;}
.refresh-opt .ro-s{font-size:11px;color:var(--text-faint);margin-top:1px;line-height:1.25;}
.refresh-status{margin-top:8px;padding:9px 10px;border-radius:11px;background:var(--track-bg);font-size:12px;
  color:var(--text-dim);display:flex;align-items:center;gap:7px;}
.refresh-status .rs-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex:0 0 auto;animation:rsPulse 1.1s infinite;}
.refresh-status.done .rs-dot{background:var(--lime);animation:none;}
.refresh-status.error .rs-dot{background:var(--red);animation:none;}
@keyframes rsPulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.screen{display:none;}
.screen.active{display:block;animation:fadeUp .45s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.loading{text-align:center;padding:60px 20px;color:var(--text-faint);font-size:13px;}
.empty{text-align:center;padding:36px 20px;color:var(--text-faint);}
.empty .ei{font-size:32px;margin-bottom:10px;opacity:.5;}
.empty .et{font-size:13px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:18px 4px 11px;}
.section-head h2{font-size:18px;font-weight:400;font-family:var(--font-display);letter-spacing:-0.01em;}
.section-head .link{font-size:13px;color:var(--lime-deep);font-weight:600;cursor:pointer;}

/* top cards (visão geral) */
.top-cards{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.tcard{padding:15px 16px 16px;min-height:158px;display:flex;flex-direction:column;border-radius:var(--radius-sm);cursor:pointer;}
.tcard .chev{position:absolute;top:13px;right:14px;color:var(--text-faint);font-size:15px;z-index:4;}
.logos{display:flex;align-items:center;}
.logos .lg{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);margin-left:-8px;color:#fff;}
.logos .lg:first-child{margin-left:0;}
.logos .lg svg{width:56%;height:56%;}
.logos .lg .txt{font-size:12px;font-weight:700;font-family:var(--font-display);}
.tcard .spacer{flex:1;}
.tcard .ck{font-size:16px;color:var(--text-dim);font-weight:400;}
.tcard .cv{font-size:20px;font-weight:700;letter-spacing:-0.02em;font-family:var(--font-display);margin-top:3px;line-height:1;}
.tcard .cs{font-size:13px;color:var(--text-faint);margin-top:4px;font-weight:500;}
.split{display:flex;flex-direction:column;gap:11px;}
.split .blk .bk{font-size:13px;color:var(--text-faint);font-weight:500;letter-spacing:0;}
.split .blk .bv{font-size:20px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.02em;margin-top:1px;}
.split .blk .bv.neg{color:var(--red);}
.split .blk .bv.pos{color:var(--lime-deep);}
.split .divider{height:1px;background:var(--glass-border);}
/* bento */
.bento{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.tile{padding:14px 15px 13px;cursor:pointer;transition:transform .16s;min-height:112px;display:flex;flex-direction:column;border-radius:var(--radius-sm);}
.tile:active{transform:scale(0.97);}
.tile .chev{position:absolute;top:12px;right:13px;color:var(--text-faint);font-size:14px;z-index:4;}
.tile .tile-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.tile .tile-icon svg{width:17px;height:17px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.tile .spacer{flex:1;}
.tile .tk{font-size:16px;color:var(--text-dim);font-weight:400;}
.tile .tv{font-size:20px;font-weight:700;letter-spacing:-0.02em;font-family:var(--font-display);margin-top:2px;}
.tile .ts{font-size:13px;color:var(--text-faint);margin-top:2px;font-weight:500;}
.barstack{display:flex;gap:4px;}
.barstack span{height:8px;border-radius:4px;}
.ring{width:40px;height:40px;}
.invest-tile{flex-direction:row!important;align-items:center;gap:12px;min-height:auto!important;padding:14px 16px!important;}
.invest-tile .invest-tile-main{flex:1;min-width:0;}
.invest-tile .tv{margin-top:0;}
/* faturas list */
.fatura-card{border-radius:var(--radius-sm);}
.frow{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;transition:background .15s;}
.frow:not(:last-child){border-bottom:1px solid var(--glass-border);}
.frow:active{background:rgba(255,255,255,0.04);}
.fbadge{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:#fff;}
.fbadge svg{width:56%;height:56%;}
.fbadge .txt{font-weight:700;font-size:12px;font-family:var(--font-display);}
.fmain{flex:1 1 auto;min-width:0;}
.ftitle{font-size:16px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fsub{font-size:13px;color:var(--text-faint);margin:2px 0 7px;font-weight:500;}
.ftrack{height:4px;border-radius:4px;background:var(--track-bg);overflow:hidden;}
.ffill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--lime-deep),var(--lime));}
.fval{font-size:20px;font-weight:700;flex:0 0 auto;font-family:var(--font-display);letter-spacing:-0.02em;}
.fchev{color:var(--text-faint);font-size:16px;flex:0 0 auto;}
/* resumo dos cartões */
.cards-resumo{display:flex;align-items:stretch;padding:14px 10px;border-radius:var(--radius-sm);margin-bottom:11px;}
.cr-blk{flex:1;text-align:center;display:flex;flex-direction:column;gap:3px;min-width:0;}
.cr-blk .bk{font-size:12px;color:var(--text-faint);font-weight:500;}
.cr-blk .bv{font-size:17px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr-blk .bv.neg{color:var(--red);}
.cr-blk .bv.pos{color:var(--lime-deep);}
.cr-div{width:1px;background:var(--glass-border);margin:1px 4px;}
/* carrossel cartões */
.carousel{display:flex;gap:11px;overflow-x:auto;scroll-snap-type:x mandatory;padding:4px 4px 10px;margin:0 -4px;scrollbar-width:none;}
.carousel::-webkit-scrollbar{display:none;}
.ccard{flex:0 0 86%;scroll-snap-align:center;border-radius:18px;padding:16px 18px;min-height:148px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,0.3);}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;}
.cc-bank{display:flex;align-items:center;gap:10px;}
.cc-logo{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.18);}
.cc-logo svg{width:58%;height:58%;color:#fff;}
.cc-logo .txt{font-weight:700;font-size:15px;font-family:var(--font-display);}
.cc-name{font-size:16px;font-weight:400;opacity:.95;}
.cc-flag{font-size:13px;opacity:.7;font-weight:500;}
.cc-chip{width:28px;height:21px;border-radius:5px;background:linear-gradient(135deg,rgba(255,255,255,0.5),rgba(255,255,255,0.2));}
.cc-mid{margin-top:auto;}
.cc-label{font-size:13px;opacity:.75;font-weight:500;letter-spacing:0;}
.cc-fatura{font-size:26px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.02em;margin-top:2px;}
.cc-foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:10px;}
.cc-foot .it .k{font-size:13px;opacity:.7;font-weight:500;letter-spacing:0;}
.cc-foot .it .v{font-size:13px;font-weight:600;font-family:var(--font-display);margin-top:1px;}
.cc-glow{position:absolute;right:-30px;bottom:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.22),transparent 70%);pointer-events:none;}
.dots{display:flex;justify-content:center;gap:6px;margin:2px 0 12px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text-faint);opacity:.4;transition:all .3s;cursor:pointer;}
.dot.active{opacity:1;width:18px;border-radius:3px;background:var(--lime);}
/* panel + chart */
.panel{padding:18px;border-radius:var(--radius-sm);margin-bottom:13px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.panel-head .pt{font-size:16px;color:var(--text-dim);font-weight:400;}
.panel-head .pic{width:30px;height:30px;border-radius:9px;background:var(--track-bg);display:flex;align-items:center;justify-content:center;color:var(--text-dim);}
.panel .big{font-size:26px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.02em;}
.chart{display:flex;align-items:flex-end;justify-content:space-between;gap:7px;height:120px;margin-top:16px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;}
.bar-wrap{width:100%;height:100px;display:flex;align-items:flex-end;border-radius:7px;overflow:hidden;background:var(--chart-bar);}
.bar{width:100%;border-radius:7px 7px 0 0;background:linear-gradient(180deg,var(--lime),var(--lime-deep));transition:height .6s cubic-bezier(0.16,1,0.3,1);min-height:3px;}
.bar-col.dim .bar{background:var(--chart-bar);}
.bar-lbl{font-size:13px;color:var(--text-faint);font-weight:500;}
.bar-col.active .bar-lbl{color:var(--lime-deep);font-weight:700;}
/* transações */
.tx-list{border-radius:var(--radius-sm);overflow:hidden;}
.tx{display:flex;align-items:center;gap:12px;padding:12px 15px;}
.tx:not(:last-child){border-bottom:1px solid var(--glass-border);}
.tx-ic{width:38px;height:38px;border-radius:12px;background:var(--track-bg);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:15px;color:var(--text-dim);}
.tx-main{flex:1;min-width:0;}
.tx-desc{font-size:16px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:10.5px;color:var(--text-faint);margin-top:2px;font-weight:500;}
.tx-val{font-size:17px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.02em;flex:0 0 auto;}
.tx-val.in{color:var(--lime-deep);}
.tx-parcela{display:inline-block;background:var(--track-bg);color:var(--text-faint);font-size:9.5px;padding:1px 6px;border-radius:6px;margin-left:6px;}

/* sub-abas (parcelas/assinaturas) */
.subtabs{display:flex;gap:6px;background:var(--track-bg);padding:4px;border-radius:14px;margin-bottom:14px;}
.subtab{flex:1;text-align:center;padding:9px;border-radius:11px;font-size:14px;font-weight:600;font-family:var(--font-display);color:var(--text-faint);cursor:pointer;transition:all .25s;}
.subtab.active{background:var(--glass-bg);color:var(--text);box-shadow:var(--card-shadow);}
[data-theme="light"] .subtab.active{background:#fff;}
.subpane{display:none;}
.subpane.active{display:block;animation:fadeUp .35s ease both;}
/* item de parcelamento */
.pcard{padding:15px 16px;border-radius:var(--radius-sm);margin-bottom:10px;}
.pcard-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.pcard-name{font-size:16px;font-weight:400;font-family:var(--font-display);}
.pcard-card{font-size:13px;color:var(--text-faint);margin-top:1px;}
.pcard-val{font-size:20px;font-weight:700;font-family:var(--font-display);text-align:right;}
.pcard-val .sub{font-size:13px;color:var(--text-faint);font-weight:500;}
.pprog{height:6px;border-radius:6px;background:var(--track-bg);overflow:hidden;margin-bottom:6px;}
.pprog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--lime-deep),var(--lime));}
.pcard-meta{display:flex;justify-content:space-between;font-size:13px;color:var(--text-faint);font-weight:500;}
/* assinatura */
.acard{display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:var(--radius-sm);margin-bottom:10px;}
.aic{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:18px;background:var(--track-bg);}
.amain{flex:1;min-width:0;}
.aname{font-size:16px;font-weight:400;font-family:var(--font-display);}
.afreq{font-size:13px;color:var(--text-faint);margin-top:1px;}
.aval{font-size:20px;font-weight:700;font-family:var(--font-display);text-align:right;}
.aval .sub{font-size:13px;color:var(--text-faint);font-weight:500;}
/* investimentos */
.inv-hero{padding:22px;border-radius:var(--radius-sm);margin-bottom:13px;text-align:center;}
.inv-hero .k{font-size:16px;color:var(--text-dim);font-weight:400;}
.inv-hero .big{font-size:26px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.02em;margin:6px 0 4px;}
.inv-hero .delta{font-size:13px;font-weight:600;color:var(--lime-deep);}
.inv-row{display:flex;align-items:center;gap:12px;padding:14px 15px;}
.inv-row:not(:last-child){border-bottom:1px solid var(--glass-border);}
.inv-ic{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:#fff;font-weight:700;font-size:12px;font-family:var(--font-display);}
.inv-main{flex:1;min-width:0;}
.inv-name{font-size:16px;font-weight:400;}
.inv-tipo{font-size:13px;color:var(--text-faint);margin-top:1px;}
.inv-val{text-align:right;}
.inv-val .v{font-size:20px;font-weight:700;font-family:var(--font-display);}
.inv-val .r{font-size:13px;color:var(--lime-deep);font-weight:500;margin-top:1px;}
/* previsões */
.prev-hero{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px;}
.prev-box{padding:18px 16px;border-radius:var(--radius-sm);}
.prev-box .k{font-size:16px;color:var(--text-dim);font-weight:400;}
.prev-box .v{font-size:26px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.02em;margin-top:4px;}
.prev-box .v.neg{color:var(--red);}
.prev-box .v.pos{color:var(--lime-deep);}
.prev-box .s{font-size:13px;color:var(--text-faint);margin-top:3px;}
.prev-arrow{text-align:center;color:var(--text-faint);font-size:18px;margin:-4px 0 8px;}
.calc-card{padding:18px;border-radius:var(--radius-sm);margin-bottom:13px;}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;font-size:13px;}
.calc-row:not(:last-child){border-bottom:1px solid var(--glass-border);}
.calc-row .lbl{color:var(--text-dim);}
.calc-row .amt{font-weight:600;font-family:var(--font-display);}
.calc-row .amt.neg{color:var(--red);}
.calc-row .amt.pos{color:var(--lime-deep);}
.calc-row.total{margin-top:4px;padding-top:13px;border-top:2px solid var(--glass-border);font-size:14px;}
.calc-row.total .lbl{color:var(--text);font-weight:600;font-family:var(--font-display);}
.calc-row.total .amt{font-size:20px;font-weight:700;}
/* form recorrentes */
.rec-add{display:flex;gap:8px;margin-bottom:12px;}
.rec-add input,.rec-add select{flex:1;min-width:0;padding:11px 12px;border-radius:11px;border:1px solid var(--glass-border);
  background:var(--glass-bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none;}
.rec-add input::placeholder{color:var(--text-faint);}
.rec-add .add-btn{flex:0 0 auto;width:44px;border-radius:11px;border:none;background:var(--lime);color:#0a0a0a;font-size:22px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.rec-add .add-btn:active{transform:scale(0.9);}
.rec-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:var(--glass-bg);border:1px solid var(--glass-border);margin-bottom:8px;}
.rec-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
.rec-dot.in{background:var(--lime);}
.rec-dot.out{background:var(--red);}
.rec-name{flex:1;font-size:16px;font-weight:400;}
.rec-val{font-size:20px;font-weight:700;font-family:var(--font-display);}
.rec-val.in{color:var(--lime-deep);}
.rec-val.out{color:var(--red);}
.rec-del{color:var(--text-faint);cursor:pointer;font-size:17px;padding:0 2px;}
.rec-group-label{font-size:13px;color:var(--text-faint);font-weight:600;letter-spacing:0;margin:14px 2px 8px;}
.banner{padding:11px 14px;border-radius:12px;background:rgba(77,163,255,0.12);border:1px solid rgba(77,163,255,0.25);color:var(--blue);font-size:13px;margin-bottom:13px;line-height:1.5;}
.cnt{font-size:13px;color:var(--text-faint);font-weight:500;}
/* navbar */
.navbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(26px + env(safe-area-inset-bottom,0px));z-index:100;
  width:calc(100% - 48px);max-width:253px;height:var(--nav-h);display:flex;align-items:center;padding:0 5px;
  background:var(--nav-bg);backdrop-filter:blur(26px) saturate(180%);-webkit-backdrop-filter:blur(26px) saturate(180%);
  border:1px solid var(--glass-border);border-radius:29px;box-shadow:0 8px 30px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.10);}
.nav-pill{position:absolute;width:39px;height:39px;top:50%;transform:translateY(-50%);border-radius:13px;
  background:var(--nav-pill);box-shadow:inset 0 1px 0 rgba(255,255,255,0.16);
  transition:left .42s cubic-bezier(0.34,1.4,0.5,1),top .42s cubic-bezier(0.34,1.4,0.5,1),width .42s cubic-bezier(0.34,1.4,0.5,1),height .42s cubic-bezier(0.34,1.4,0.5,1);z-index:1;pointer-events:none;}
.nav-item{flex:1;display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-faint);cursor:pointer;position:relative;z-index:2;transition:color .25s;}
.nav-ico{position:relative;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.nav-item svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.85;stroke-linecap:round;stroke-linejoin:round;transition:transform .42s cubic-bezier(0.34,1.4,0.5,1);}
.nav-item.active{color:var(--text);}
.nav-item.active svg{stroke-width:2.05;transform:translateY(-1px) scale(1.08);}
.nav-label{display:none;font-size:13px;font-weight:500;white-space:nowrap;}
.nav-dot{position:absolute;top:-2px;right:-2px;width:6px;height:6px;border-radius:50%;background:var(--red);display:none;z-index:3;}
.nav-item.has-alert .nav-dot{display:block;}
@media(min-width:760px){
  body{padding-bottom:0;padding-left:220px;}
  .app{max-width:720px;padding-top:6px;}
  .navbar{left:18px;transform:none;top:50%;translate:0 -50%;bottom:auto;width:auto;min-width:165px;max-width:189px;height:auto;flex-direction:column;align-items:stretch;gap:2px;padding:6px;border-radius:30px;}
  .nav-item{width:100%;height:50px;flex:0 0 auto;justify-content:flex-start;padding:0 14px;gap:12px;}
  .nav-label{display:inline-block;}
  .nav-pill{border-radius:15px;}
  .bento{grid-template-columns:repeat(4,1fr);}
  .ccard{flex:0 0 48%;}
}
@media(prefers-reduced-motion:reduce){.screen.active,.bar{animation:none;transition:none;}.nav-pill{transition:none;}}

  <div class="nav-item" data-i="2" title="Parcelas" aria-label="Parcelas"><span class="nav-ico"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/><circle cx="19" cy="18" r="2.4"/></svg><span class="nav-dot"></span></span><span class="nav-label">Parcelas</span></div>
  <div class="nav-item" data-i="3" title="Investimentos" aria-label="Investimentos"><span class="nav-ico"><svg viewBox="0 0 24 24"><path d="M3 17l5-5 4 4 8-8"/><path d="M21 8v5h-5"/></svg></span><span class="nav-label">Investimentos</span></div>
  <div class="nav-item" data-i="4" title="Previsões" aria-label="Previsões"><span class="nav-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span><span class="nav-label">Previsões</span></div>
</nav>

<script>
(function(){
  "use strict";

  /* ===== CONFIG ===== */
  var params = new URLSearchParams(location.search);
  var SHEET_ID_PLACEHOLDER = "COLE_AQUI_O_ID_DA_SUA_PLANILHA";
  var SHEET_ID = params.get("sheet") || "1KWxKPc423DanjPLNPpcEpBv4zuwwY-B-dTzqMqWFpGo";
  // Link /exec da implantação do Apps Script como "App da Web" (Implantar > Nova implantação).
  // NÃO é o link do editor — precisa terminar em .../exec.
  var GAS_EXEC_URL_PLACEHOLDER = "COLE_AQUI_O_LINK_/exec_DA_IMPLANTACAO";
  var GAS_EXEC_URL = params.get("gas") || GAS_EXEC_URL_PLACEHOLDER;
  var MESES_ABREV = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  var state = { contas:[], cartoes:[], categorias:[], transacoes:[], parcelamentos:[], assinaturas:[], metas:[], investimentos:[], faturaEmAberto:{} };

  function $(s){ return document.querySelector(s); }

  function escapeHtml(s){
    if(s==null) return "";
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }

  function formatBRL(n){
    n = Number(n)||0;
    return n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
  }

  // Padroniza texto vindo de fontes inconsistentes (banco, categorias): primeira letra maiúscula, resto minúsculo.
  function sentenceCase(s){
    s = String(s||'').trim();
    if(!s) return s;
    s = s.toLowerCase();
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function cellVal(row, i){
    if(!row || !row[i]) return null;
    return row[i].v;
  }
  function parseGvizDate(v){
    if(v == null) return null;
    if(typeof v === 'string'){
      var m = /Date\((\d+),\s*(\d+),\s*(\d+)/.exec(v);
      if(m) return new Date(+m[1], +m[2], +m[3]);
    }
    return null;
  }

  function numVal(row, i){
    var v = cellVal(row, i);
    if(typeof v === 'number') return v;
    var f = parseFloat(v);
    return isNaN(f) ? 0 : f;
  }

  function strVal(row, i){ var v = cellVal(row, i); return v==null ? "" : String(v); }

  function dateVal(row, i){ return parseGvizDate(cellVal(row, i)); }

  function clamp(n, min, max){ return Math.min(max, Math.max(min, n)); }

  function monthsBetween(d1, d2){
    if(!d1) return 0;
    return (d2.getFullYear()-d1.getFullYear())*12 + (d2.getMonth()-d1.getMonth());
  }

  function initials(name){
    if(!name) return "?";
    var parts = name.trim().split(/\s+/);
    return (parts[0][0] + (parts[1] ? parts[1][0] : "")).toUpperCase();
  }

  function fetchSheet(name){
    var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
      "/gviz/tq?tqx=out:json&headers=1&sheet=" + encodeURIComponent(name) + "&_=" + Date.now();
    return fetch(url).then(function(res){
      if(!res.ok) throw new Error("HTTP " + res.status);
      return res.text();
    }).then(function(text){
      var start = text.indexOf('(');
      var end = text.lastIndexOf(')');
      if(start === -1 || end === -1) throw new Error("Resposta inesperada do Google Sheets para a aba \"" + name + "\".");
      var json = JSON.parse(text.substring(start+1, end));
      if(!json.table || !json.table.rows) return [];
      return json.table.rows.map(function(r){ return r.c; });
    });
  }

  function mapContas(rows){
    return rows.map(function(c){
      return { nome: strVal(c,1), instituicao: strVal(c,2), tipo: strVal(c,3), saldo: numVal(c,4), ativa: strVal(c,5) || "Sim" };
    }).filter(function(x){ return x.nome; });
  }

  function mapCartoes(rows){
    return rows.map(function(c){
      return { nome: strVal(c,1), instituicao: strVal(c,2), limite: numVal(c,3), fechamento: numVal(c,4), vencimento: numVal(c,5), ativo: strVal(c,6) || "Sim" };
    }).filter(function(x){ return x.nome; });
  }

  function mapCategorias(rows){
    return rows.map(function(c){ return { nome: strVal(c,0), tipo: strVal(c,1) }; }).filter(function(x){ return x.nome; });
  }

  function mapTransacoes(rows, origem){
    return rows.map(function(c){
      return {
        data: dateVal(c,1), descricao: strVal(c,2), categoria: strVal(c,3),
        conta: strVal(c,4), cartao: strVal(c,5), tipo: strVal(c,6) || "Saída",
        valor: numVal(c,7), parcelamentoId: strVal(c,8), obs: strVal(c,9),
        origem: origem || "conta"
      };
    }).filter(function(x){ return x.descricao || x.valor; });
  }

  function mapParcelamentos(rows){
    return rows.map(function(c){
      var total = numVal(c,4), nParcelas = numVal(c,5) || 1, inicio = dateVal(c,7);
      return {
        descricao: strVal(c,1), cartao: strVal(c,2), categoria: strVal(c,3),
        valorTotal: total, nParcelas: nParcelas, valorParcela: total / (nParcelas || 1), inicio: inicio
      };
    }).filter(function(x){ return x.descricao; });
  }

  function mapAssinaturas(rows){
    return rows.map(function(c){
      return {
        nome: strVal(c,1), categoria: strVal(c,2), valor: numVal(c,3), frequencia: strVal(c,4) || "Mensal",
        diaCobranca: numVal(c,5), origem: strVal(c,6), ativa: strVal(c,7) || "Sim"
      };
    }).filter(function(x){ return x.nome; });
  }

  function mapInvestimentos(rows){
    return rows.map(function(c){
      return {
        banco: strVal(c,0), produto: strVal(c,1), tipo: strVal(c,2), taxa: strVal(c,3),
        valorAplicado: numVal(c,4), valorAtual: numVal(c,5), valorLiquido: numVal(c,6),
        impostos: numVal(c,7), aplicacaoMaisAntiga: dateVal(c,8), obs: strVal(c,9)
      };
    }).filter(function(x){ return x.produto; });
  }

  function mapFaturaEmAberto(rows){
    var mapa = {};
    rows.forEach(function(c){
      var nome = strVal(c,0);
      if(nome) mapa[nome] = { valor: numVal(c,1), saldo: numVal(c,2), regra: strVal(c,3), alerta: strVal(c,4) };
    });
    return mapa;
  }

  function getInvoiceWindow(closingDay, ref){
    ref = ref || new Date();
    var y = ref.getFullYear(), m = ref.getMonth(), d = ref.getDate();
    var start, end;
    if(d <= closingDay){
      end = new Date(y, m, closingDay);
      start = new Date(y, m-1, closingDay+1);
    } else {
      end = new Date(y, m+1, closingDay);
      start = new Date(y, m, closingDay+1);
    }
    return {start:start, end:end};
  }

  function historicoFaturas(card, nMeses){
    if(!card.fechamento) return [];
    var hoje = new Date();
    var out = [];

    // 1ª linha: a fatura ATUAL, ainda em formação (a que o app do banco chama de "fatura aberta")
    var janelaAtual = getInvoiceWindow(card.fechamento, hoje);
    var vencAtual = vencimentoDaJanela(janelaAtual, card.vencimento, card.fechamento);
    var valorAtual = state.transacoes.filter(function(t){
      return t.cartao === card.nome && t.tipo === "Saída" && t.data && t.data >= janelaAtual.start && t.data <= janelaAtual.end;
    }).reduce(function(s,t){ return s+t.valor; }, 0);
    out.push({ janela: janelaAtual, vencimento: vencAtual, valor: valorAtual, status: "Em formação" });

    // Demais linhas: ciclos já fechados, mais antigos
    var janela = janelaAnterior(card.fechamento, janelaAtual.start);
    for(var i=0;i<nMeses-1;i++){
      var vencimento = vencimentoDaJanela(janela, card.vencimento, card.fechamento);
      var jaVenceu = hoje > vencimento;
      var valor = state.transacoes.filter(function(t){
        return t.cartao === card.nome && t.tipo === "Saída" && t.data && t.data >= janela.start && t.data <= janela.end;
      }).reduce(function(s,t){ return s+t.valor; }, 0);
      out.push({ janela: janela, vencimento: vencimento, valor: valor, status: jaVenceu ? "Vencida" : "Aguardando vencimento" });
      janela = janelaAnterior(card.fechamento, janela.start);
    }
    return out;
  }

  function janelaAnterior(closingDay, janelaAtualStart){
    var fimAnterior = new Date(janelaAtualStart);
    fimAnterior.setDate(fimAnterior.getDate() - 1);
    return getInvoiceWindow(closingDay, fimAnterior);
  }

  function vencimentoDaJanela(janela, vencimentoDay, closingDay){
    var vencimento = new Date(janela.end.getFullYear(), janela.end.getMonth(), vencimentoDay || closingDay);
    if(vencimento <= janela.end) vencimento.setMonth(vencimento.getMonth() + 1);
    return vencimento;
  }

  // Normaliza nome de cartão pra comparar (ignora maiúsc/minúsc, espaços duplicados e acentos),
  // pra não perder o match entre a aba "Cartões" e a aba "Fatura Em Aberto" por uma diferença boba de formatação.
  function normalizarNomeCartao(s){
    return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
  }
  function buscarFaturaEmAberto(nomeCartao){
    if(!state.faturaEmAberto) return null;
    if(state.faturaEmAberto[nomeCartao] != null) return state.faturaEmAberto[nomeCartao];
    var alvo = normalizarNomeCartao(nomeCartao);
    for(var k in state.faturaEmAberto){
      if(normalizarNomeCartao(k) === alvo) return state.faturaEmAberto[k];
    }
    return null;
  }
  function faturaAtual(card){
    // Prioriza o valor REAL calculado pela regra de cada banco (aba Fatura Em Aberto).
    // Cai no cálculo por janela só se a aba ainda não tiver esse cartão (match tolerante a formatação).
    var real = buscarFaturaEmAberto(card.nome);
    if(real && real.valor != null) return real.valor;
    if(!card.fechamento) return 0;
    var win = getInvoiceWindow(card.fechamento);
    return state.transacoes.filter(function(t){
      return t.cartao === card.nome && t.tipo === "Saída" && t.data && t.data >= win.start && t.data <= win.end;
    }).reduce(function(s,t){ return s+t.valor; }, 0);
  }

  function mapContas(rows){
    return rows.map(function(c){
      return { nome:strVal(c,1), instituicao:strVal(c,2), tipo:strVal(c,3), saldo:numVal(c,4), ativa:strVal(c,5)||"Sim" };
    }).filter(function(x){ return x.nome; });
  }
  function mapCategorias(rows){
    return rows.map(function(c){ return { nome:strVal(c,1), tipo:strVal(c,2) }; }).filter(function(x){return x.nome;});
  }

  /* ===== logos / bancos ===== */
  var BANCO_INFO = {
    nubank:  { cor1:"#820ad1", cor2:"#5b0a93", logo:"logo-nubank", flag:"Mastercard" },
    itau:    { cor1:"#ec7000", cor2:"#b35400", logo:"txt-i", flag:"Mastercard" },
    mercado: { cor1:"#00b1ea", cor2:"#0086b3", logo:"logo-mercadopago", flag:"Visa" },
    default: { cor1:"#3a3a40", cor2:"#222226", logo:"txt-c", flag:"Cartão" }
  };
  function bancoDe(nome){
    var n=(nome||'').toLowerCase();
    if(n.indexOf('nubank')!==-1) return BANCO_INFO.nubank;
    if(n.indexOf('ita')!==-1) return BANCO_INFO.itau;
    if(n.indexOf('mercado')!==-1) return BANCO_INFO.mercado;
    return BANCO_INFO.default;
  }
  function logoHtml(info){
    if(info.logo==='txt-i') return '<span class="txt">i</span>';
    if(info.logo==='txt-c') return '<span class="txt">C</span>';
    return '<svg><use href="#'+info.logo+'"/></svg>';
  }
  function badgeHtml(nome, cls){
    var info=bancoDe(nome);
    var inner = (info.logo==='txt-i')?'<span class="txt">i</span>':(info.logo==='txt-c')?'<span class="txt">'+initials(nome)+'</span>':'<svg><use href="#'+info.logo+'"/></svg>';
    return '<div class="'+(cls||'fbadge')+'" style="background:'+info.cor1+'">'+inner+'</div>';
  }

  /* ===== agregações ===== */
  function totalFaturasAbertas(){
    return state.cartoes.filter(function(c){return c.ativo!=="Não";}).reduce(function(s,c){return s+faturaAtual(c);},0);
  }
  function saldoTotalContas(){
    return state.contas.filter(function(c){return c.ativa!=="Não";}).reduce(function(s,c){return s+(c.saldo||0);},0);
  }
  function gastosDoMes(){
    var h=new Date();
    return state.transacoes.filter(function(t){
      return t.tipo==="Saída"&&t.data&&t.data.getMonth()===h.getMonth()&&t.data.getFullYear()===h.getFullYear();
    }).reduce(function(s,t){return s+t.valor;},0);
  }
  function totalAssinaturas(){
    return state.assinaturas.filter(function(a){return a.ativa!=="Não";})
      .reduce(function(s,a){return s+(a.frequencia==="Anual"?a.valor/12:a.valor);},0);
  }
  function parcelamentosAtivos(){
    return state.parcelamentos.filter(function(p){
      if(!p.inicio)return false;
      var pagas=clamp(monthsBetween(p.inicio,new Date())+1,0,p.nParcelas);
      return pagas<p.nParcelas;
    });
  }
  function totalParcelasMes(){
    return parcelamentosAtivos().reduce(function(s,p){return s+p.valorParcela;},0);
  }
  function limiteTotal(){ return state.cartoes.filter(function(c){return c.ativo!=="Não";}).reduce(function(s,c){return s+(c.limite||0);},0); }
  function limiteDisponivel(){ return limiteTotal()-totalFaturasAbertas(); }

  /* ===== TELA 1: VISÃO GERAL ===== */
  function renderVisaoGeral(){
    var saldo=saldoTotalContas();
    var faturas=totalFaturasAbertas();
    var gastos=gastosDoMes();
    var assin=totalAssinaturas();
    var limDisp=limiteDisponivel(), limTot=limiteTotal();
    var parcAtivos=parcelamentosAtivos();
    var previsao=saldo-faturas;  // simplificado; tela Previsões refina
    var contasAtivas=state.contas.filter(function(c){return c.ativa!=="Não";});
    var investAtual=state.investimentos.reduce(function(s,i){return s+(i.valorAtual||0);},0);
    var investAplicado=state.investimentos.reduce(function(s,i){return s+(i.valorAplicado||0);},0);

    var logosTopo=contasAtivas.slice(0,4).map(function(c){
      var info=bancoDe(c.instituicao||c.nome);
      var inner=(info.logo==='txt-i')?'<span class="txt">i</span>':(info.logo==='txt-c')?'<span class="txt">'+initials(c.nome)+'</span>':'<svg><use href="#'+info.logo+'"/></svg>';
      return '<div class="lg" style="background:'+info.cor1+'">'+inner+'</div>';
    }).join("");

    var pctLim=limTot>0?clamp((limDisp/limTot)*100,0,100):0;
    var ringOffset=97-(97*pctLim/100);

    var faturasLista=state.cartoes.filter(function(c){return c.ativo!=="Não";}).map(function(card){
      var info=bancoDe(card.nome);
      var fat=faturaAtual(card);
      var pct=card.limite>0?clamp((fat/card.limite)*100,0,100):0;
      var win=getInvoiceWindow(card.fechamento);
      var venc=vencimentoDaJanela(win,card.vencimento,card.fechamento);
      return '<div class="frow" data-card="'+escapeHtml(card.nome)+'">'+badgeHtml(card.nome)+
        '<div class="fmain"><div class="ftitle">'+escapeHtml(card.nome)+'</div>'+
        '<div class="fsub">vence '+venc.toLocaleDateString('pt-BR')+'</div>'+
        '<div class="ftrack"><div class="ffill" style="width:'+pct+'%"></div></div></div>'+
        '<div class="fval">'+formatBRL(fat)+'</div><div class="fchev">›</div></div>';
    }).join("");

    return ''+
    '<div class="top-cards">'+
      '<div class="glass tcard" data-go="4"><span class="chev">›</span>'+
        '<div class="logos">'+(logosTopo||'<div class="lg" style="background:#3a3a40"><span class="txt">$</span></div>')+'</div>'+
        '<div class="spacer"></div><div class="ck">Saldo em contas</div>'+
        '<div class="cv">'+formatBRL(saldo)+'</div>'+
        '<div class="cs">'+contasAtivas.length+(contasAtivas.length===1?' conta':' contas')+'</div></div>'+
      '<div class="glass tcard" data-go="4"><span class="chev">›</span>'+
        '<div class="split" style="margin-top:2px">'+
          '<div class="blk"><div class="bk">Faturas em aberto</div><div class="bv">'+formatBRL(faturas)+'</div></div>'+
          '<div class="divider"></div>'+
          '<div class="blk"><div class="bk">Previsão fim do mês</div><div class="bv '+(previsao<0?'neg':'pos')+'">'+formatBRL(previsao)+'</div></div>'+
        '</div><div class="spacer"></div>'+
        '<div class="cs">após faturas em aberto</div></div>'+
    '</div>'+
    '<div class="bento">'+
      '<div class="glass tile" data-go="1"><span class="chev">›</span>'+
        '<div class="barstack"><span style="width:46%;background:var(--orange)"></span><span style="width:30%;background:var(--pink)"></span><span style="width:16%;background:var(--magenta)"></span></div>'+
        '<div class="spacer"></div><div class="tk">Gastos · este mês</div><div class="tv">'+formatBRL(gastos)+'</div><div class="ts">este mês</div></div>'+
      '<div class="glass tile" data-go="2" data-sub="assin"><span class="chev">›</span>'+
        '<div class="tile-icon" style="background:rgba(124,77,255,0.18);color:#cba6ff"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M4 7l8-4 8 4v10l-8 4-8-4V7z"/><path d="M12 3v18M4 7l8 4 8-4"/></svg></div>'+
        '<div class="spacer"></div><div class="tk">Assinaturas</div><div class="tv">'+formatBRL(assin)+'</div><div class="ts">por mês</div></div>'+
      '<div class="glass tile" data-go="1"><span class="chev">›</span>'+
        '<svg class="ring" viewBox="0 0 36 36"><circle cx="18" cy="18" r="15.5" fill="none" stroke="var(--track-bg)" stroke-width="3.4"/><circle cx="18" cy="18" r="15.5" fill="none" stroke="var(--lime)" stroke-width="3.4" stroke-dasharray="97" stroke-dashoffset="'+ringOffset+'" stroke-linecap="round" transform="rotate(-90 18 18)"/></svg>'+
        '<div class="spacer"></div><div class="tk">Limite disponível</div><div class="tv">'+formatBRL(limDisp)+'</div><div class="ts">de '+formatBRL(limTot)+'</div></div>'+
      '<div class="glass tile" data-go="2" data-sub="parc"><span class="chev">›</span>'+
        '<div class="tile-icon" style="background:rgba(255,138,61,0.18);color:var(--orange)"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg></div>'+
        '<div class="spacer"></div><div class="tk">Parcelamentos</div><div class="tv">'+parcAtivos.length+' ativos</div><div class="ts">'+formatBRL(totalParcelasMes())+' / mês</div></div>'+
      (state.investimentos.length?'<div class="glass tile invest-tile" data-go="3" style="grid-column:1 / -1"><span class="chev">›</span>'+
        '<div class="tile-icon" style="background:rgba(180,244,74,0.18);color:var(--lime-deep)"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 17l5-5 4 4 8-8"/><path d="M21 8v5h-5"/></svg></div>'+
        '<div class="invest-tile-main"><div class="tk">Investimentos</div><div class="ts">'+formatBRL(investAplicado)+' investido</div></div>'+
        '<div class="tv">'+formatBRL(investAtual)+'</div></div>':'')+
    '</div>'+
    '<div class="section-head"><h2>Faturas em aberto</h2><span class="link" data-go="1">Ver cartões</span></div>'+
    '<div class="glass fatura-card">'+(faturasLista||'<div class="empty" style="padding:24px"><div class="et">Nenhum cartão ativo.</div></div>')+'</div>';
  }

  /* ===== TELA 2: CARTÕES ===== */
  var cartaoAtivo=0;
  var subtabAlvo=null; // guarda qual sub-aba (parc/assin) abrir ao entrar na tela "Parcelas"
  var mesSelecionado=null; // índice dentro do array de 6 ciclos do gráfico; null = ciclo atual (a última barra)
  var MESES_COMPLETO=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

  // Gera as últimas nMeses janelas de FATURA (fechamento a fechamento) — o mesmo ciclo que a
  // aba "Fatura Em Aberto" usa. Isso é o que faltava: antes o gráfico somava por mês de calendário,
  // que é uma janela diferente da fatura, daí os valores nunca bateriam com o card do cartão.
  function janelasFaturaCartao(card,nMeses){
    var janela=getInvoiceWindow(card.fechamento,new Date());
    var lista=[];
    for(var i=0;i<nMeses;i++){
      lista.unshift(janela);
      janela=janelaAnterior(card.fechamento,janela.start);
    }
    return lista; // mais antiga primeiro, ciclo atual (em formação) por último
  }
  function gastosPorMesCartao(card,nMeses){
    if(!card.fechamento){
      // sem dia de fechamento cadastrado na planilha: cai no mês de calendário como aproximação
      var hoje=new Date(),out=[];
      for(var i=nMeses-1;i>=0;i--){
        var d=new Date(hoje.getFullYear(),hoje.getMonth()-i,1);
        var ini=new Date(d.getFullYear(),d.getMonth(),1),fim=new Date(d.getFullYear(),d.getMonth()+1,0);
        var total=state.transacoes.filter(function(t){return t.cartao===card.nome&&t.tipo==="Saída"&&t.data&&t.data>=ini&&t.data<=fim;}).reduce(function(s,t){return s+t.valor;},0);
        out.push({janela:{start:ini,end:fim},mes:d.getMonth(),ano:d.getFullYear(),total:total,atual:i===0});
      }
      return out;
    }
    var janelas=janelasFaturaCartao(card,nMeses);
    return janelas.map(function(janela,idx){
      var atual=(idx===janelas.length-1);
      // Pro ciclo atual usa o MESMO valor oficial do card do carrossel (aba Fatura Em Aberto);
      // pros ciclos já fechados, soma as transações reais dentro da janela de fechamento certa.
      var total=atual?faturaAtual(card):state.transacoes.filter(function(t){
        return t.cartao===card.nome&&t.tipo==="Saída"&&t.data&&t.data>=janela.start&&t.data<=janela.end;
      }).reduce(function(s,t){return s+t.valor;},0);
      var venc=vencimentoDaJanela(janela,card.vencimento,card.fechamento);
      return {janela:janela,mes:venc.getMonth(),ano:venc.getFullYear(),total:total,atual:atual};
    });
  }
  function transacoesDoCartaoJanela(nomeCartao,janela){
    return state.transacoes.filter(function(t){return t.cartao===nomeCartao&&t.data&&t.data>=janela.start&&t.data<=janela.end;}).sort(function(a,b){return b.data-a.data;});
  }
  function renderCartoes(){
    var ativos=state.cartoes.filter(function(c){return c.ativo!=="Não";});
    if(!ativos.length) return '<div class="empty"><div class="ei">💳</div><div class="et">Nenhum cartão na planilha.</div></div>';

    var totalFat=ativos.reduce(function(s,c){return s+faturaAtual(c);},0);
    var totalLim=ativos.reduce(function(s,c){return s+(c.limite||0);},0);
    var totalDisp=totalLim-totalFat;
    var resumo='<div class="glass cards-resumo">'+
      '<div class="cr-blk"><div class="bk">Em aberto</div><div class="bv">'+formatBRL(totalFat)+'</div></div>'+
      '<div class="cr-div"></div>'+
      '<div class="cr-blk"><div class="bk">Limite total</div><div class="bv">'+formatBRL(totalLim)+'</div></div>'+
      '<div class="cr-div"></div>'+
      '<div class="cr-blk"><div class="bk">Disponível</div><div class="bv '+(totalDisp<0?'neg':'pos')+'">'+formatBRL(totalDisp)+'</div></div>'+
    '</div>';
    var cards=ativos.map(function(card){
      var info=bancoDe(card.nome),fat=faturaAtual(card),disp=card.limite-fat;
      return '<div class="ccard" style="background:linear-gradient(140deg,'+info.cor1+','+info.cor2+')"><div class="cc-glow"></div>'+
        '<div class="cc-top"><div class="cc-bank"><div class="cc-logo">'+logoHtml(info)+'</div><div><div class="cc-name">'+escapeHtml(card.nome)+'</div><div class="cc-flag">'+info.flag+'</div></div></div><div class="cc-chip"></div></div>'+
        '<div class="cc-mid"><div class="cc-label">Fatura em aberto</div><div class="cc-fatura">'+formatBRL(fat)+'</div></div>'+
        '<div class="cc-foot"><div class="it"><div class="k">Disponível</div><div class="v">'+formatBRL(disp)+'</div></div><div class="it" style="text-align:right"><div class="k">Vencimento</div><div class="v">'+(card.vencimento?'dia '+card.vencimento:'—')+'</div></div></div></div>';
    }).join("");
    var dots=ativos.map(function(_,i){return '<div class="dot'+(i===cartaoAtivo?' active':'')+'" data-d="'+i+'"></div>';}).join("");
    return resumo+'<div class="carousel" id="carousel">'+cards+'</div><div class="dots" id="dots">'+dots+'</div>'+
      '<div class="glass panel" id="chartPanel"></div>'+
      '<div class="section-head"><h2 id="txTitle">Transações</h2><span class="cnt" id="txCount"></span></div>'+
      '<div class="glass tx-list" id="txList"></div>';
  }
  function renderDetalheCartao(card){
    if(!card)return;
    var meses=gastosPorMesCartao(card,6);
    var max=Math.max.apply(null,meses.map(function(m){return m.total;}).concat([1]));
    var idxAtual=meses.length-1;
    var idxSel=(mesSelecionado!=null&&mesSelecionado>=0&&mesSelecionado<meses.length)?mesSelecionado:idxAtual;
    var bars=meses.map(function(m,i){
      var h=Math.round((m.total/max)*100),ativo=(i===idxSel);
      return '<div class="bar-col'+(ativo?' active':' dim')+'" data-i="'+i+'"><div class="bar-wrap"><div class="bar" style="height:'+h+'%"></div></div><div class="bar-lbl">'+MESES_ABREV[m.mes]+'</div></div>';
    }).join("");
    var mSel=meses[idxSel];
    var rotulo=mSel.atual?'Fatura em aberto':'Fatura de '+MESES_COMPLETO[mSel.mes];
    var cp=document.getElementById('chartPanel');
    if(cp){
      cp.innerHTML='<div class="panel-head"><span class="pt">'+rotulo+'</span><div class="pic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18"/></svg></div></div><div class="big">'+formatBRL(mSel.total)+'</div><div class="chart">'+bars+'</div>';
      cp.querySelectorAll('.bar-col').forEach(function(bc){
        bc.addEventListener('click',function(){
          mesSelecionado=Number(bc.getAttribute('data-i'));
          renderDetalheCartao(card);
        });
      });
    }
    var txs=transacoesDoCartaoJanela(card.nome,mSel.janela);
    var tt=document.getElementById('txTitle'); if(tt) tt.textContent=mSel.atual?'Transações':'Transações · fatura de '+MESES_COMPLETO[mSel.mes];
    var tc=document.getElementById('txCount'); if(tc) tc.textContent=txs.length+(txs.length===1?' lançamento':' lançamentos');
    var tl=document.getElementById('txList'); if(!tl)return;
    if(!txs.length){ tl.innerHTML='<div class="empty" style="padding:28px"><div class="et">Nenhuma transação neste ciclo.</div></div>'; return; }
    tl.innerHTML=txs.map(function(t){
      var ent=t.tipo==="Entrada",dia=t.data.getDate(),mes=MESES_ABREV[t.data.getMonth()];
      var parc=t.parcelamentoId?'<span class="tx-parcela">'+escapeHtml(t.parcelamentoId)+'</span>':'';
      return '<div class="tx"><div class="tx-ic">'+(ent?'↓':'↑')+'</div><div class="tx-main"><div class="tx-desc">'+escapeHtml(sentenceCase(t.descricao)||"—")+parc+'</div><div class="tx-meta">'+dia+' '+mes+' · '+escapeHtml(sentenceCase(t.categoria)||"Sem categoria")+'</div></div><div class="tx-val'+(ent?' in':'')+'">'+(ent?'+':'')+formatBRL(t.valor)+'</div></div>';
    }).join("");
  }
  function wireCartoes(){
    mesSelecionado=null; // volta a mostrar o mês atual ao entrar na tela
    var ativos=state.cartoes.filter(function(c){return c.ativo!=="Não";});
    renderDetalheCartao(ativos[cartaoAtivo]);
    var carousel=document.getElementById('carousel'); if(!carousel)return;
    var cards=carousel.querySelectorAll('.ccard');
    var timer;
    carousel.addEventListener('scroll',function(){
      clearTimeout(timer);
      timer=setTimeout(function(){
        var center=carousel.scrollLeft+carousel.offsetWidth/2,closest=0,min=Infinity;
        cards.forEach(function(c,i){var cc=c.offsetLeft+c.offsetWidth/2,d=Math.abs(cc-center);if(d<min){min=d;closest=i;}});
        if(closest!==cartaoAtivo){cartaoAtivo=closest;mesSelecionado=null;document.querySelectorAll('#dots .dot').forEach(function(d,i){d.classList.toggle('active',i===cartaoAtivo);});renderDetalheCartao(ativos[cartaoAtivo]);}
      },90);
    });
    document.querySelectorAll('#dots .dot').forEach(function(dot){dot.addEventListener('click',function(){cards[Number(dot.getAttribute('data-d'))].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});});});
  }

  function wirePrevisoes(){
    var add=document.getElementById('recAdd'); if(!add)return;
    add.addEventListener('click',function(){
      var nome=(document.getElementById('recNome').value||'').trim();
      var valor=parseFloat(document.getElementById('recValor').value);
      var tipo=document.getElementById('recTipo').value;
      if(!nome||isNaN(valor)||valor<=0){ return; }
      var recs=lerRecorrentes(); recs.push({nome:nome,valor:valor,tipo:tipo}); salvarRecorrentes(recs);
      irPara(4); // re-render previsões

    document.querySelectorAll('[data-del]').forEach(function(d){
      d.addEventListener('click',function(){
        var i=Number(d.getAttribute('data-del'));

      });

  /* ===== NAVEGAÇÃO ENTRE TELAS ===== */
  var TELAS=[
    {id:'visao',  titulo:'Visão Geral',  render:renderVisaoGeral, wire:wireFaturasClicaveis},

  var telaAtual=0;

  function dataHoje(){
    var d=new Date();
    var dias=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
    var meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    return dias[d.getDay()]+', '+d.getDate()+' de '+meses[d.getMonth()];

  function saudacao(){
    var h=new Date().getHours();
    if(h>=5&&h<12) return 'Bom dia';
    if(h>=12&&h<18) return 'Boa tarde';
    return 'Boa noite';
  }

  // Atualiza o texto do cabeçalho e o estado "encolhido" (fade ao rolar).
  // Usada tanto ao navegar entre telas quanto no scroll, pra ficarem sempre consistentes.
  function atualizarCabecalho(){
    var topEl=document.querySelector('.top');
    var scrolled=window.scrollY>24;
    if(topEl) topEl.classList.toggle('scrolled',scrolled);
    var titleEl=document.getElementById('appTitle');
    if(!titleEl) return;
    if(telaAtual===0){
      titleEl.textContent=scrolled?'Roniell':(saudacao()+', Roniell');

  function irPara(i){
    telaAtual=i;
    var tela=TELAS[i];
    document.getElementById('appSub').textContent='';
    var content=document.getElementById('content');
    content.innerHTML='<div class="screen active">'+tela.render()+'</div>';
    if(tela.wire) tela.wire();
    // navbar
    document.querySelectorAll('.nav-item').forEach(function(x){x.classList.remove('active');});
    var item=document.querySelector('.nav-item[data-i="'+i+'"]');

    window.scrollTo(0,0);

  /* ===== navbar pill =====
     Centraliza a pílula no centro real do item (via getBoundingClientRect, relativo à navbar),
     em vez de depender de offsetLeft/offsetWidth — isso é o que causava o desalinhamento. */
  function movePill(el){
    var pill=$("#navPill"), navbar=$("#navbar");
    if(!pill||!navbar||!el) return;
    var isDesktop=window.matchMedia("(min-width:760px)").matches;
    var navRect=navbar.getBoundingClientRect(), itemRect=el.getBoundingClientRect();
    var w,h;
    if(isDesktop){ w=itemRect.width-10; h=41; } // cobre ícone+nome da aba inteira
    else { w=39; h=39; } // pílula compacta, só o ícone
    var cx=(itemRect.left+itemRect.width/2)-navRect.left;
    var cy=(itemRect.top+itemRect.height/2)-navRect.top;
    pill.style.width=w+"px";
    pill.style.height=h+"px";
    pill.style.left=(cx-w/2)+"px";
    pill.style.top=(cy-h/2)+"px";
    pill.style.transform="none";
  }
  document.querySelectorAll(".nav-item").forEach(function(it){
    it.addEventListener("click",function(){ irPara(Number(it.getAttribute("data-i"))); });
  });
  window.addEventListener("resize",function(){ movePill(document.querySelector(".nav-item.active")); });

  /* ===== tema + cor de destaque ===== */
  var THEME_KEY="financeiro-theme";
  var ACCENT_KEY="financeiro-accent";
  var accentSalvo; try{accentSalvo=localStorage.getItem(ACCENT_KEY);}catch(e){}

  function hexToRgb(hex){
    hex=String(hex||'').replace('#','');
    if(hex.length===3) hex=hex.split('').map(function(c){return c+c;}).join('');
    var num=parseInt(hex,16)||0;
    return {r:(num>>16)&255,g:(num>>8)&255,b:num&255};
  }
  function darkenHex(hex,fator){
    var c=hexToRgb(hex);
    var f=function(v){return Math.max(0,Math.min(255,Math.round(v*fator))).toString(16).padStart(2,'0');};
    return '#'+f(c.r)+f(c.g)+f(c.b);
  }
  function buildGlow(theme,rgb){
    var cor='rgba('+rgb.r+','+rgb.g+','+rgb.b+',';
    if(theme==='light'){
      return 'radial-gradient(130% 80% at 50% -15%, '+cor+'0.10), transparent 48%), radial-gradient(80% 55% at 95% 5%, rgba(124,77,255,0.05), transparent 45%)';
    }
    return 'radial-gradient(130% 85% at 50% -12%, '+cor+'0.15), transparent 52%), radial-gradient(80% 55% at 92% 8%, rgba(124,77,255,0.09), transparent 48%)';
  }
  function aplicarAcento(hex){
    if(!hex) return;
    var rgb=hexToRgb(hex);
    var theme=document.documentElement.getAttribute('data-theme')==='light'?'light':'dark';
    document.documentElement.style.setProperty('--lime',hex);
    document.documentElement.style.setProperty('--lime-deep',darkenHex(hex,0.72));
    document.documentElement.style.setProperty('--glow',buildGlow(theme,rgb));
  }

  function aplicarTema(t){
    if(t==="light")document.documentElement.setAttribute("data-theme","light"); else document.documentElement.removeAttribute("data-theme");
    if(accentSalvo) aplicarAcento(accentSalvo); // reaplica o brilho com a geometria certa pro tema atual
  }
  var temaSalvo; try{temaSalvo=localStorage.getItem(THEME_KEY);}catch(e){}
  aplicarTema(temaSalvo||"dark");
  $("#themeToggle").addEventListener("click",function(){
    var atual=document.documentElement.getAttribute("data-theme")==="light"?"light":"dark";
    var novo=atual==="light"?"dark":"light"; aplicarTema(novo);
    try{localStorage.setItem(THEME_KEY,novo);}catch(e){}
  });

  var colorToggle=$("#colorToggle"), colorPop=$("#colorPop"), colorCustom=$("#colorCustom");
  if(colorToggle&&colorPop){
    colorToggle.addEventListener("click",function(ev){
      ev.stopPropagation();
      colorPop.classList.toggle("show");
    });
    document.addEventListener("click",function(ev){
      if(colorPop.classList.contains("show")&&!colorPop.contains(ev.target)&&ev.target!==colorToggle&&!colorToggle.contains(ev.target)){
        colorPop.classList.remove("show");
      }
    });
    document.querySelectorAll(".swatch[data-c]").forEach(function(sw){
      sw.addEventListener("click",function(){
        var hex=sw.getAttribute("data-c");
        aplicarAcento(hex);
        try{localStorage.setItem(ACCENT_KEY,hex);}catch(e){}
        colorPop.classList.remove("show");
      });
    });
    if(colorCustom){
      colorCustom.addEventListener("input",function(){
        aplicarAcento(colorCustom.value);
        try{localStorage.setItem(ACCENT_KEY,colorCustom.value);}catch(e){}
      });
    }
  }

  /* ===== bancos conectados (badge + popover) ===== */
  var ultimaAtualizacao=null;

  function tempoRelativo(data){
    if(!data) return '—';
    var min=Math.floor((Date.now()-data.getTime())/60000);
    if(min<1) return 'agora';
    if(min<60) return 'há '+min+'min';
    var h=Math.floor(min/60);
    if(h<24) return 'há '+h+'h';
    return 'há '+Math.floor(h/24)+'d';
  }
  function bancosUnicos(){
    var mapa={},ordem=[];
    function add(nome){
      nome=(nome||'').trim(); if(!nome) return;
      if(!mapa[nome]){ mapa[nome]={nome:nome,n:0}; ordem.push(nome); }
      mapa[nome].n++;
    }
    state.contas.forEach(function(c){ add(c.instituicao||c.nome); });
    state.cartoes.forEach(function(c){ add(c.instituicao||c.nome); });
    return ordem.map(function(n){ return mapa[n]; });
  }
  function logoOuIniciais(nome){
    var info=bancoDe(nome);
    return (info.logo==='txt-i')?'<span class="txt">i</span>':(info.logo==='txt-c')?'<span class="txt">'+initials(nome)+'</span>':'<svg><use href="#'+info.logo+'"/></svg>';
  }
  function renderBancos(){
    var bancos=bancosUnicos();
    var stack=$("#banksStack");
    if(stack){
      stack.innerHTML=bancos.length?bancos.slice(0,3).map(function(b){
        var info=bancoDe(b.nome);
        return '<div class="bs-logo" style="background:'+info.cor1+'">'+logoOuIniciais(b.nome)+'</div>';
      }).join(""):'<div class="bs-logo" style="background:#3a3a40"><span class="txt">$</span></div>';
    }
    var list=$("#banksList");
    if(list){
      list.innerHTML=bancos.length?bancos.map(function(b){
        var info=bancoDe(b.nome);
        return '<div class="bank-row"><div class="bic" style="background:'+info.cor1+'">'+logoOuIniciais(b.nome)+'</div>'+
          '<div class="bmain"><div class="bname">'+escapeHtml(b.nome)+'</div><div class="bupd"><span class="bdot"></span>Atualizado '+tempoRelativo(ultimaAtualizacao)+'</div></div></div>';
      }).join(""):'<div class="empty" style="padding:14px"><div class="et">Nenhuma conta conectada ainda.</div></div>';
    }
  }
  var banksToggle=$("#banksToggle"), banksPop=$("#banksPop"), banksRefresh=$("#banksRefresh");
  if(banksToggle&&banksPop){
    banksToggle.addEventListener("click",function(ev){
      ev.stopPropagation();
      renderBancos(); // recalcula o "atualizado há Xmin" no momento em que abre
      banksPop.classList.toggle("show");
    });
    document.addEventListener("click",function(ev){
      if(banksPop.classList.contains("show")&&!banksPop.contains(ev.target)&&ev.target!==banksToggle&&!banksToggle.contains(ev.target)){
        banksPop.classList.remove("show");
      }
    });
    if(banksRefresh){
      banksRefresh.addEventListener("click",function(ev){
        ev.stopPropagation();
        loadAll();
      });
    }
  }

  /* ===== atualização (popover: sincronizar com o banco x só recarregar a planilha) ===== */
  var refreshToggle=$("#refreshBtn"), refreshPop=$("#refreshPop"), refreshStatusEl=$("#refreshStatus");
  var refreshSync=$("#refreshSync"), refreshPageOpt=$("#refreshPage");
  var syncEmAndamento=false, syncTimerInt=null;

  function setRefreshStatus(texto, tipo){
    if(!refreshStatusEl) return;
    refreshStatusEl.style.display="flex";
    refreshStatusEl.className="refresh-status"+(tipo?" "+tipo:"");
    refreshStatusEl.innerHTML="<span class=\"rs-dot\"></span><span>"+escapeHtml(texto)+"</span>";
  }

  if(refreshToggle&&refreshPop){
    refreshToggle.addEventListener("click",function(ev){
      ev.stopPropagation();
      refreshPop.classList.toggle("show");
    });
    document.addEventListener("click",function(ev){
      if(refreshPop.classList.contains("show")&&!refreshPop.contains(ev.target)&&ev.target!==refreshToggle&&!refreshToggle.contains(ev.target)){
        refreshPop.classList.remove("show");
      }
    });
  }

  if(refreshPageOpt){
    refreshPageOpt.addEventListener("click",function(ev){
      ev.stopPropagation();
      if(syncEmAndamento) return;
      refreshPop.classList.remove("show");
      loadAll();
    });
  }

  // Chama o Web App do Apps Script (doGet -> syncCompleto). Mede o tempo decorrido em tempo
  // real (atualiza o status a cada segundo) e, quando o Apps Script responde, mostra "Concluído
  // em Xs" e recarrega a planilha automaticamente.
  function sincronizarComBanco(){
    syncEmAndamento=true;
    refreshToggle.classList.add("spin");
    var inicio=Date.now();
    setRefreshStatus("Sincronizando… 0s","loading");
    syncTimerInt=setInterval(function(){
      setRefreshStatus("Sincronizando… "+Math.floor((Date.now()-inicio)/1000)+"s","loading");
    },1000);

    fetch(GAS_EXEC_URL,{method:"GET"})
      .then(function(res){
        if(!res.ok) throw new Error("HTTP "+res.status);
        return res.json();
      })
      .then(function(json){
        clearInterval(syncTimerInt);
        var total=Math.round((Date.now()-inicio)/1000);
        syncEmAndamento=false;
        refreshToggle.classList.remove("spin");
        setRefreshStatus("Concluído em "+total+"s — atualizando…","done");
        loadAll();
        setTimeout(function(){ if(refreshStatusEl) refreshStatusEl.style.display="none"; },4000);
      })
      .catch(function(err){
        clearInterval(syncTimerInt);
        syncEmAndamento=false;
        refreshToggle.classList.remove("spin");
        setRefreshStatus("Erro ao sincronizar: "+err.message,"error");
      });
  }

  if(refreshSync){
    refreshSync.addEventListener("click",function(ev){
      ev.stopPropagation();
      if(syncEmAndamento) return;
      if(!GAS_EXEC_URL || GAS_EXEC_URL===GAS_EXEC_URL_PLACEHOLDER){
        setRefreshStatus("Configure GAS_EXEC_URL com o link /exec da implantação do Apps Script.","error");
        return;
      }
      sincronizarComBanco();
    });
  }

  /* ===== load ===== */
  function loadAll(){
    var btn=$("#refreshBtn"); if(btn) btn.classList.add("spin");
    var nomes=["Contas","Cartões","Categorias","Transações Cartão","Transações Conta","Parcelamentos","Assinaturas","Investimentos","Fatura Em Aberto"];
    Promise.all(nomes.map(function(n){ return fetchSheet(n).catch(function(){ return []; }); }))
      .then(function(r){
        state.contas = mapContas(r[0]);
        state.cartoes = mapCartoes(r[1]);
        state.categorias = mapCategorias(r[2]);
        state.transacoes = mapTransacoes(r[3],"cartao").concat(mapTransacoes(r[4],"conta"));
        state.parcelamentos = mapParcelamentos(r[5]);
        state.assinaturas = mapAssinaturas(r[6]);
        state.investimentos = mapInvestimentos(r[7]);
        state.faturaEmAberto = mapFaturaEmAberto(r[8]);
        ultimaAtualizacao = new Date();
        renderBancos();
        if(btn) btn.classList.remove("spin");
        irPara(telaAtual);
      })
      .catch(function(err){
        if(btn) btn.classList.remove("spin");
        $("#content").innerHTML = "<div class=\'empty\'><div class=\'ei\'>⚠️</div><div class=\'et\'>Erro ao carregar a planilha: "+escapeHtml(err.message)+"<br><br>Verifique se o ID da planilha está correto e se ela está acessível.</div></div>";
      });
  }

  if(SHEET_ID === SHEET_ID_PLACEHOLDER){
    $("#content").innerHTML = "<div class=\'empty\' style=\'padding-top:60px\'><div class=\'ei\'>🔧</div><div class=\'et\'>Configure o ID da sua planilha Google Sheets na variável SHEET_ID, no início do script.</div></div>";
  } else {
    loadAll();
    setInterval(loadAll, 5*60*1000);
  }
})();
</script>
</body>
</html>
